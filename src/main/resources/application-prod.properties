# ========================================
# = SERVER
# ========================================
# Render inyecta PORT autom�ticamente
server.port=${PORT:8080}

# ========================================
# = DATA SOURCE
# ========================================
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# ========================================
# = HIKARICP (connection pool)
# ========================================
spring.datasource.hikari.maximum-pool-size=${SPRING_DATASOURCE_HIKARI_MAXIMUM_POOL_SIZE:5}
spring.datasource.hikari.minimum-idle=${SPRING_DATASOURCE_HIKARI_MINIMUM_IDLE:2}
# Required for Supabase Transaction Pooler (PgBouncer transaction mode):
# disables server-side prepared statements which are not supported in transaction mode.
spring.datasource.hikari.data-source-properties.prepareThreshold=0

# ========================================
# = JPA / HIBERNATE
# ========================================
# "none" en prod — el schema ya existe en Supabase; aplicar cambios manualmente via SQL editor
# "update" abre una conexión DDL extra fuera de HikariCP que agota el pool_size del Session Pooler
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# ========================================
# = SQL INITIALIZATION
# ========================================
spring.sql.init.mode=never

# ========================================
# = CORS
# ========================================
# Setear en Render: CORS_ALLOWED_ORIGINS=https://www.spendwise.com.ar,https://spendwise.com.ar
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000}

# ========================================
# = EXTERNAL APIS
# ========================================
external.dolarApi.base-url=https://dolarapi.com
external.dolarApiHistorical.base-url=https://argentinadatos.com/

# ========================================
# = OBSERVABILITY
# ========================================
management.otlp.metrics.export.enabled=false

# ========================================
# = LOGGING
# ========================================
logging.structured.format.console=ecs

# ========================================
# = JWT
# ========================================
jwt.secret=${JWT_SECRET}

# ========================================
# = RESEND EMAIL API
# ========================================
# Setear en Render: RESEND_API_KEY=re_xxxxxxxxxxxx
resend.api-key=${RESEND_API_KEY}
# Setear en Render: RESEND_FROM=SpendWise <noreply@spendwise.com.ar>
# Requiere verificar el dominio spendwise.com.ar en el dashboard de Resend
resend.from=${RESEND_FROM:SpendWise <noreply@spendwise.com.ar>}

# ========================================
# = APP
# ========================================
# Setear en Render: APP_BASE_URL=https://www.spendwise.com.ar
app.base-url=${APP_BASE_URL:https://www.spendwise.com.ar}

# ========================================
# = GMAIL IMAP
# ========================================
# Setear en Render: GMAIL_ENCRYPTION_KEY=$(openssl rand -base64 32)
gmail.encryption-key=${GMAIL_ENCRYPTION_KEY}

# ========================================
# = ADMIN
# ========================================
# Setear en Render: ADMIN_PASSWORD=<contraseña segura>
admin.password=${ADMIN_PASSWORD}
